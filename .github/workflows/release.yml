name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write  # Required for npm OIDC trusted publishing

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: mnemex-darwin-arm64
          - os: macos-latest
            target: bun-darwin-x64
            artifact: mnemex-darwin-x64
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: mnemex-linux-x64
          - os: ubuntu-24.04-arm
            target: bun-linux-arm64
            artifact: mnemex-linux-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        # GITHUB_TOKEN authenticates @vscode/ripgrep's postinstall download from
        # GitHub Releases; without it the download hits the anonymous 60 req/hr
        # rate limit and fails with HTTP 403.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun install

      - name: Download grammars
        run: bun run download-grammars

      - name: Build binary
        run: bun build src/index.ts --compile --target=${{ matrix.target }} --external @opentui/core --external @opentui/react --outfile ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            cp "$dir/$name" "release/$name"
            chmod +x "release/$name"
          done
          ls -la release/

      - name: Generate manifest and checksums
        run: |
          bun scripts/generate-manifest.ts ${{ steps.version.outputs.version }} release
          cat release/manifest.json
          cat release/checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/mnemex-*
            release/manifest.json
            release/checksums.txt
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    # OIDC trusted publishing - no NPM_TOKEN needed!
    # Configure at: https://www.npmjs.com/package/mnemex/access (Trusted Publishers)

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        # Node 24 ships with npm 11.x, which includes OIDC trusted publishing
        # (npm 11.11.0+). Previously we used Node 22 (npm 10.x, no trusted
        # publishing) and ran `npm install -g npm@latest` to upgrade — but that
        # reliably corrupts @npmcli/arborist's transitive deps on the runner
        # image, producing:
        #   npm error code MODULE_NOT_FOUND
        #   npm error Cannot find module 'promise-retry'
        # Switching to Node 24 avoids the in-place npm upgrade entirely.
        # check-latest: true forces fetch of the newest cached 24.x so we get
        # at least npm 11.11.0 even if the runner image hasn't rotated yet.
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          check-latest: true
          registry-url: 'https://registry.npmjs.org'

      - name: Verify npm supports OIDC trusted publishing
        # OIDC trusted publishing requires npm >= 11.11.0 (landed 2026-02-25).
        # Fail fast with a clear message if Node 24 ever ships an older npm.
        run: |
          NPM_VERSION=$(npm --version)
          echo "npm version: ${NPM_VERSION}"
          MAJOR=$(echo "$NPM_VERSION" | cut -d. -f1)
          MINOR=$(echo "$NPM_VERSION" | cut -d. -f2)
          if [ "$MAJOR" -lt 11 ] || { [ "$MAJOR" -eq 11 ] && [ "$MINOR" -lt 11 ]; }; then
            echo "::error::npm ${NPM_VERSION} does not support OIDC trusted publishing (need >=11.11.0)"
            exit 1
          fi

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun install

      - name: Download grammars
        run: bun run download-grammars

      - name: Build
        run: bun run build

      - name: Publish to npm
        run: npm publish --access public --provenance

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_HOMEBREW == 'true' }}

    steps:
      - name: Get release info
        id: release
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Wait for release assets
          sleep 10

          # Get checksums
          curl -sL "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/checksums.txt" -o checksums.txt

          DARWIN_ARM64_SHA=$(grep "darwin-arm64" checksums.txt | awk '{print $1}')
          DARWIN_X64_SHA=$(grep "darwin-x64" checksums.txt | awk '{print $1}')
          LINUX_ARM64_SHA=$(grep "linux-arm64" checksums.txt | awk '{print $1}')
          LINUX_X64_SHA=$(grep "linux-x64" checksums.txt | awk '{print $1}')

          echo "darwin_arm64_sha=$DARWIN_ARM64_SHA" >> $GITHUB_OUTPUT
          echo "darwin_x64_sha=$DARWIN_X64_SHA" >> $GITHUB_OUTPUT
          echo "linux_arm64_sha=$LINUX_ARM64_SHA" >> $GITHUB_OUTPUT
          echo "linux_x64_sha=$LINUX_X64_SHA" >> $GITHUB_OUTPUT

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: MadAppGang/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update formula
        run: |
          mkdir -p tap/Formula
          cat > tap/Formula/mnemex.rb << EOF
          class Mnemex < Formula
            desc "Seven-layer code memory, benchmarked — AST-aware semantic code index"
            homepage "https://github.com/MadAppGang/mnemex"
            version "${{ steps.release.outputs.version }}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/MadAppGang/mnemex/releases/download/v${{ steps.release.outputs.version }}/mnemex-darwin-arm64"
                sha256 "${{ steps.release.outputs.darwin_arm64_sha }}"
              end
              on_intel do
                url "https://github.com/MadAppGang/mnemex/releases/download/v${{ steps.release.outputs.version }}/mnemex-darwin-x64"
                sha256 "${{ steps.release.outputs.darwin_x64_sha }}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/MadAppGang/mnemex/releases/download/v${{ steps.release.outputs.version }}/mnemex-linux-arm64"
                sha256 "${{ steps.release.outputs.linux_arm64_sha }}"
              end
              on_intel do
                url "https://github.com/MadAppGang/mnemex/releases/download/v${{ steps.release.outputs.version }}/mnemex-linux-x64"
                sha256 "${{ steps.release.outputs.linux_x64_sha }}"
              end
            end

            def install
              os_tag = OS.mac? ? "darwin" : "linux"
              arch_tag = Hardware::CPU.arm? ? "arm64" : "x64"
              bin.install "mnemex-#{os_tag}-#{arch_tag}" => "mnemex"
            end

            test do
              assert_match "mnemex", shell_output("#{bin}/mnemex --version")
            end
          end
          EOF

      - name: Push to tap
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/mnemex.rb
          git commit -m "Update mnemex to v${{ steps.release.outputs.version }}"
          git push
