<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C5CE7"/>
      <stop offset="100%" style="stop-color:#4834D4"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="20" fill="url(#bg)"/>
  <!-- Brain/memory icon -->
  <g transform="translate(64,58)" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left hemisphere -->
    <path d="M-6,-24 C-22,-24 -32,-14 -32,0 C-32,8 -28,14 -22,18 C-26,22 -24,28 -18,28 C-14,28 -10,26 -8,22"/>
    <path d="M-32,0 C-38,0 -40,6 -38,10 C-36,14 -32,14 -30,12"/>
