    <path d="M6,-24 C22,-24 32,-14 32,0 C32,8 28,14 22,18 C26,22 24,28 18,28 C14,28 10,26 8,22"/>
    <path d="M32,0 C38,0 40,6 38,10 C36,14 32,14 30,12"/>
    <!-- Center connection -->
    <line x1="0" y1="-24" x2="0" y2="28"/>
    <!-- Synapses -->
    <circle cx="-14" cy="-8" r="2.5" fill="#fff" stroke="none"/>
    <circle cx="14" cy="-8" r="2.5" fill="#fff" stroke="none"/>
    <circle cx="-10" cy="10" r="2.5" fill="#fff" stroke="none"/>
    <circle cx="10" cy="10" r="2.5" fill="#fff" stroke="none"/>
    <circle cx="0" cy="0" r="2.5" fill="#fff" stroke="none"/>
  </g>
  <!-- Search magnifier -->
  <g transform="translate(88,88)" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round">
    <circle cx="0" cy="0" r="12" fill="rgba(255,255,255,0.15)"/>
    <line x1="8.5" y1="8.5" x2="16" y2="16"/>
  </g>
</svg>
